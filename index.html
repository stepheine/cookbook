<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭烹飪大師 - 五日便當提案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tool-chip.active {
            background-color: #f97316;
            color: white;
            border-color: #f97316;
        }

        .tool-chip {
            transition: all 0.2s ease;
        }

        /* 自定義捲軸 */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #fb923c;
            border-radius: 10px;
        }
    </style>
</head>
<body class="max-w-md mx-auto bg-gray-50 min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-white px-6 pt-8 pb-6 rounded-b-[2rem] shadow-sm sticky top-0 z-50 border-b border-orange-50">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">家庭烹飪大師</h1>
                <p class="text-xs text-orange-500 font-medium">個人化五日便當專家</p>
            </div>
            <div class="bg-orange-500 p-3 rounded-2xl shadow-lg shadow-orange-200">
                <i class="fa-solid fa-utensils text-white text-xl"></i>
            </div>
        </div>
    </header>

    <main class="px-6 mt-6 space-y-6">
        
        <!-- Ingredients Input -->
        <section class="space-y-3">
            <label class="flex items-center text-gray-700 font-bold space-x-2">
                <div class="w-1 h-4 bg-orange-500 rounded-full"></div>
                <span>冰箱裡的食材</span>
            </label>
            <textarea id="ingredients" 
                class="w-full h-32 p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-500 outline-none transition-all shadow-sm text-gray-600 leading-relaxed placeholder:text-gray-300"
                placeholder="例如：雞腿肉、青江菜、雞蛋、紅蘿蔔、洋蔥..."></textarea>
        </section>

        <!-- Tool Selection -->
        <section class="space-y-3">
            <label class="flex items-center text-gray-700 font-bold space-x-2">
                <div class="w-1 h-4 bg-orange-500 rounded-full"></div>
                <span>可用廚房工具</span>
            </label>
            <div class="grid grid-cols-2 gap-3" id="tool-container">
                <button onclick="toggleTool(this)" data-tool="IH爐" class="tool-chip flex items-center justify-center p-3 rounded-xl border border-gray-100 bg-white text-gray-600 font-medium shadow-sm active:scale-95">
                    IH 爐
                </button>
                <button onclick="toggleTool(this)" data-tool="卡式爐" class="tool-chip flex items-center justify-center p-3 rounded-xl border border-gray-100 bg-white text-gray-600 font-medium shadow-sm active:scale-95">
                    卡式爐
                </button>
                <button onclick="toggleTool(this)" data-tool="水波爐" class="tool-chip flex items-center justify-center p-3 rounded-xl border border-gray-100 bg-white text-gray-600 font-medium shadow-sm active:scale-95">
                    水波爐
                </button>
                <button onclick="toggleTool(this)" data-tool="烤箱" class="tool-chip flex items-center justify-center p-3 rounded-xl border border-gray-100 bg-white text-gray-600 font-medium shadow-sm active:scale-95">
                    烤箱
                </button>
            </div>
        </section>

        <!-- Generate Button -->
        <button id="generate-btn" 
            onclick="generatePlan()"
            class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center space-x-3">
            <i class="fa-solid fa-wand-magic-sparkles text-orange-400"></i>
            <span>設計專屬食譜</span>
        </button>

        <!-- Loading State -->
        <div id="loading" class="hidden flex flex-col items-center py-12 space-y-4">
            <div class="loader"></div>
            <div class="text-center">
                <p class="text-gray-800 font-bold">主廚正在規劃中...</p>
                <p class="text-gray-400 text-xs mt-1">正在確保營養與工具適配性</p>
            </div>
        </div>

        <!-- Error Message -->
        <div id="error-box" class="hidden p-5 bg-red-50 border border-red-100 rounded-2xl">
            <div class="flex space-x-3">
                <i class="fa-solid fa-circle-exclamation text-red-500 mt-1"></i>
                <div class="flex-grow">
                    <p class="font-bold text-red-800 text-sm">主廚遇到了一些狀況</p>
                    <p id="error-msg" class="text-red-600 text-xs mt-1 leading-relaxed"></p>
                    <div id="diagnostic-hint" class="mt-3 p-2 bg-white/50 rounded-lg text-[10px] text-red-400 border border-red-100"></div>
                </div>
            </div>
        </div>

        <!-- Recipe Results -->
        <div id="recipe-result" class="space-y-6 pb-10"></div>
    </main>

    <!-- Step Modal -->
    <div id="instruction-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl space-y-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-orange-500"></div>
            <div class="flex justify-between items-start">
                <h3 id="modal-title" class="text-xl font-bold text-gray-800 pr-4 leading-tight"></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl transition-colors">&times;</button>
            </div>
            <div id="modal-content" class="custom-scroll text-gray-600 text-sm leading-relaxed overflow-y-auto max-h-[60vh] space-y-4 pr-2"></div>
            <button onclick="closeModal()" class="w-full bg-orange-500 py-4 rounded-xl font-bold text-white shadow-lg shadow-orange-100 active:scale-95 transition-all">收到了，開始動手做</button>
        </div>
    </div>

    <script>
        // API Key 設定：已更新為最新的金鑰
        const apiKey = "AIzaSyAihawTkcY1rbI7NedpHdfUr3P1gvjNwow"; 
        const selectedTools = new Set();

        function toggleTool(btn) {
            const tool = btn.getAttribute('data-tool');
            if (selectedTools.has(tool)) {
                selectedTools.delete(tool);
                btn.classList.remove('active', 'border-orange-500', 'ring-2', 'ring-orange-100');
            } else {
                selectedTools.add(tool);
                btn.classList.add('active', 'border-orange-500', 'ring-2', 'ring-orange-100');
            }
        }

        async function callGemini(userQuery) {
            // 使用環境支援的 Gemini 2.5 Flash Preview 模型
            const model = "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const systemPrompt = "你是一位精通各國料理的家庭烹飪大師。請根據食材與工具，規劃週一至週五的便當食譜。每天必須有兩道菜。請確保輸出的 JSON 格式正確，包含 dailyPlan 與 missingIngredients。";

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            dailyPlan: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        day: { type: "STRING" },
                                        dishes: {
                                            type: "ARRAY",
                                            items: {
                                                type: "OBJECT",
                                                properties: {
                                                    name: { type: "STRING" },
                                                    type: { type: "STRING" },
                                                    steps: { type: "STRING" }
                                                }
                                            }
                                        }
                                    }
                                }
                            },
                            missingIngredients: { type: "ARRAY", items: { type: "STRING" } }
                        }
                    }
                }
            };

            let lastError;
            // 指數退避重試機制：1s, 2s, 4s, 8s, 16s
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(result.error?.message || `HTTP ${response.status}`);
                    }

                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("API 未回傳內容");
                    
                    return JSON.parse(text);
                } catch (err) {
                    lastError = err;
                    console.warn(`第 ${i + 1} 次嘗試失敗: ${err.message}`);
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
            throw lastError;
        }

        async function generatePlan() {
            const ingredients = document.getElementById('ingredients').value.trim();
            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loading');
            const resultArea = document.getElementById('recipe-result');
            const errorBox = document.getElementById('error-box');

            if (!ingredients) {
                alert("請告訴主廚您的冰箱裡有哪些食材。");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');
            resultArea.innerHTML = "";
            errorBox.classList.add('hidden');

            const toolsString = Array.from(selectedTools).join('、') || "基本瓦斯爐";
            const userQuery = `我的食材：${ingredients}。可用工具：${toolsString}。請設計週一至週五每日兩菜的便當食譜。`;

            try {
                const data = await callGemini(userQuery);
                renderUI(data);
            } catch (err) {
                console.error("Master Error:", err);
                document.getElementById('error-msg').innerText = err.message;
                document.getElementById('diagnostic-hint').innerText = "提示：請確保 API 金鑰有效且網路連線正常。";
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loader.classList.add('hidden');
            }
        }

        function renderUI(data) {
            const resultArea = document.getElementById('recipe-result');
            
            if (data.missingIngredients && data.missingIngredients.length > 0) {
                const hint = document.createElement('div');
                hint.className = "bg-orange-50 border border-orange-100 p-5 rounded-[1.5rem] flex items-start space-x-3";
                hint.innerHTML = `
                    <div class="bg-orange-500 rounded-full p-1.5 flex-shrink-0 mt-0.5">
                        <i class="fa-solid fa-lightbulb text-white text-[10px]"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-orange-600 uppercase tracking-widest">採購小建議</p>
                        <p class="text-xs text-orange-800 mt-1 leading-relaxed">補點食材層次更豐富：${data.missingIngredients.join('、')}</p>
                    </div>
                `;
                resultArea.appendChild(hint);
            }

            data.dailyPlan.forEach(plan => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] shadow-sm border border-gray-100 p-6 space-y-4 hover:shadow-md transition-shadow";
                
                const dishesHtml = plan.dishes.map(dish => `
                    <div class="group cursor-pointer" onclick="showSteps('${dish.name}', \`${dish.steps.replace(/`/g, "'")}\`)">
                        <div class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 group-hover:bg-orange-50 transition-colors border border-transparent group-hover:border-orange-100">
                            <div>
                                <span class="text-[9px] font-black text-orange-400 uppercase tracking-tighter">${dish.type || '家常風味'}</span>
                                <h4 class="font-bold text-gray-800 mt-0.5">${dish.name}</h4>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-orange-300 group-hover:text-orange-500 shadow-sm transition-colors">
                                <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </div>
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="flex items-center justify-between border-b border-gray-50 pb-3 mb-1">
                        <h3 class="text-sm font-black text-gray-900 tracking-widest uppercase">${plan.day}</h3>
                        <i class="fa-solid fa-calendar-check text-gray-200"></i>
                    </div>
                    <div class="space-y-3">
                        ${dishesHtml}
                    </div>
                `;
                resultArea.appendChild(card);
            });
        }

        function showSteps(title, steps) {
            const modal = document.getElementById('instruction-modal');
            document.getElementById('modal-title').innerText = title;
            
            const stepsList = steps.split('\n')
                .filter(s => s.trim() !== "")
                .map((s, i) => `
                    <div class="flex space-x-3">
                        <span class="flex-shrink-0 w-6 h-6 rounded-full bg-orange-100 text-orange-600 text-[10px] flex items-center justify-center font-black">${i + 1}</span>
                        <p class="text-gray-600">${s.replace(/^\d+[\.、\s]*/, '')}</p>
                    </div>
                `).join('');
            
            document.getElementById('modal-content').innerHTML = stepsList;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('instruction-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
